name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
            import pandas; print(f'pandas {pandas.__version__}')
            import numpy; print(f'numpy {numpy.__version__}')
            import sklearn; print(f'scikit-learn {sklearn.__version__}')
            import plotly; print(f'plotly {plotly.__version__}')
            import rich; print(f'rich {rich.__version__}')
            import scipy; print(f'scipy {scipy.__version__}')
            import regex; print(f'regex ok')
          "

      - name: Run CLI help
        run: |
          python src/main.py --help

      - name: Analyze Linux logs (no embeddings)
        run: |
          python src/main.py logs/Linux_2k.log -f cli --no-embeddings

      - name: Analyze Windows logs (no embeddings)
        run: |
          python src/main.py logs/Windows_2k.log -f cli --no-embeddings

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Bandit security scan
        run: bandit -r src/ -x src/parsers/factory.py -ll -f sarif -o bandit-results.sarif || true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit
